services:
  db:
    image: mariadb:10.11
    container_name: gm-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: u133096399_matadi
      MARIADB_USER: gm_user
      MARIADB_PASSWORD: gm_pass
      TZ: Africa/Kinshasa
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./src/libs/bdd.sql:/docker-entrypoint-initdb.d/01-bdd.sql:ro

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: gm-pma
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8080:80"

volumes:
  db_data: